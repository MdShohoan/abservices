<div class="container">
	<div class="row" class="flash_message" >
		{% with messages = get_flashed_messages(with_categories=true) %}
			{% if messages %}
				<div class=flashes>
				{% for category, message in messages %}
				<p class="{{ category }}"> <strong>{{ message }}</strong></p>
				{% endfor %}
				</div>
			{% endif %}
		{% endwith %}
		<br>
	
	</div>
	<!-- content -->
	{% block content %}{% endblock content %} 
	
	
	<!-- end content-->
</div>
