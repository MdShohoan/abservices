<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    
    <!--<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>-->
   
    <title>AB Bank PLC</title>
    <link rel="icon" type="image/ico" href='/static/image/favicon.ico'/>
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="/static/formc/bootstrap-5.0.2/css/bootstrap.min.css"
    />

    <link
      rel="stylesheet"
      href="/static/formc/css/flexslider.css"
      type="text/css"
      media="screen"
    />
    <link rel="stylesheet" href="/static/formc/css/style.css" />
    
  </head>
  <body>

    <div class="container">
        <div class="row">
            <div class="mt-3">
    
            <div class="text-center">
              <a href="/">
                <img
                  class="img-fluid"
                  src="/static/image/ab_logo.png"
                  alt="AB BANK PLC"
                />
              </a>
            </div>
          </div>
        </div>
        <!-- content -->
        <div class="row">
            {% block content %}{% endblock content %}
        </div>
        <div class="footer" style="
            position: relative;
            
            font-weight: 700;
            font-size: 13px;
            text-align: left;
            padding: 0;
            margin-top: 2.7%;
            color: #909090;
            text-transform: capitalize;
            width: 100%;
            min-height: 27px;
            background: rgba(15, 13, 13, 0.82);">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                    <p
                  class="copyright"
                  style="
                    line-height: 27px;
                    font-size: 11px;
                    text-align: center;
                    color: #909090;
                    margin: 0;
                  "
                    >
                     Copyright &copy; 2025 AB Bank. All Rights Reserved.
                    </p>
                    </div>
                </div>
            </div>
        </div>



    </div>


    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="/static/formc/bootstrap-5.0.2/js/bootstrap.js"></script>
    {% block js  %}

    {% endblock %}
    <script>
       
        function getLocalDate() {
              const now = new Date();
              const yyyy = now.getFullYear();
              const mm = String(now.getMonth() + 1).padStart(2, '0');
              const dd = String(now.getDate()).padStart(2, '0');
              //return `${yyyy}-${mm}-${dd}`;
              //return `${mm}-${dd}-${yyyy}`;
		return mm-dd-yyyy;
        }

	    
$(document).ready(function () {

          var date = new Date ();
          var today = new Date (date.getFullYear(),date.getMonth(),date.getDate());
          today.setHours(today.getHours() + 6);
	  document.getElementById('date').valueAsDate = today;
          //document.getElementById('date').value= getLocalDate();

          $('#formcid').hide();
          $('#ict').hide();
          $('#others').show();
          //$("div.othersopt").show();

          $('input[name$="remittance_type"]').change(function () {
            console.log ('alert');
            let frmtype = $('input[name$="remittance_type"]:checked').val();
            console.log (frmtype);
            $('#formcid').show();
            if (frmtype == 'ICT')
            {
              //$('#ict').prop('checked',true);
                  //$('#ict').hide();
                  //$('#others').show();
                  $("div.othersopt").hide();
                  $("div.ictopt").show();
                  $("#remittance_reference_ict").show();
                  
                  //$('input[name$="opt"]:checked').val(1);
            }else {
              //$('#othrs').prop('checked',true);
                  $('#ict').show();
                  $("#remittance_reference_ict").hide();
                  $('#others').hide();
                  $('#ictPurposeSpecify').val('');
                  $('#ictPurposeSpecify').removeAttr('required');

                  $('div.ictPurposeSpecifyClass').hide();
                  $('#opt1').prop("checked", true);
                  $("div.ictopt").hide();
                  $("div.othersopt").show();
                 // $('input[name$="opt"]:checked').val(0);

            }
            //remittance_type
          });

          
          $('div.ictPurposeSpecifyClass').hide();
          //$("div.othersopt").hide();
          
          $('input[name$="type"]').click(function () {
              if($(this).val()=='Others'){
                  $('#ictPurposeSpecify').val('');
                  $('#ictPurposeSpecify').removeAttr('required');
                  $('div.ictPurposeSpecifyClass').hide();
                  $('#opt1').prop("checked", true);
                  $("div.ictopt").hide();
                  $("div.othersopt").show();
              } else{
                  $("div.othersopt").hide();
                  $("div.ictopt").show();
              }
          });
  
          $('input[name$="opt"]').click(function () {
              if($(this).val()=='0'){
                  $('#ictPurposeSpecify').prop('required',true);
                  $('div.ictPurposeSpecifyClass').show();
              } else{
                  $('#ictPurposeSpecify').removeAttr('required');
                  $('div.ictPurposeSpecifyClass').hide();
              }
          });
        });
    </script>
  </body>
  </html>
