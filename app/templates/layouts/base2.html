<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock  title%}</title>
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
    <link rel="icon" type="image/ico" href='/static/image/favicon.ico'/>
    
    
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap-grid.css"
    />
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap-grid.min.css"
    />
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap-reboot.css"
    />
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap-reboot.min.css"
    />
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap.css"
    />
    <link
      rel="stylesheet"
      href="/static/bootstrap-4.0/dist/css/bootstrap.min.css"
    />
    <!--<link rel="stylesheet" href="style.css" />-->

    <!-- Owl Carousel -->
    <link
      rel="stylesheet"
      href="/static/OwlCarousel2-2.3.4/dist/assets/owl.carousel.css"
    />
    <link
      rel="stylesheet"
      href="/static/OwlCarousel2-2.3.4/dist/assets/owl.carousel.min.css"
    />
    <link
      rel="stylesheet"
      href="/static/OwlCarousel2-2.3.4/dist/assets/owl.theme.default.css"
    />
    <link
      rel="stylesheet"
      href="/static/OwlCarousel2-2.3.4/dist/assets/owl.theme.default.min.css"
    />

    <style>
      .alertmsg {
		padding: 15px;
		margin-bottom: 20px;
		border: 1px solid transparent;
		border-radius: 4px;
		color: #004085;
		background-color: #cce5ff;
		border-color: #b8daff;
	}
	/*.alert-primary {
		color: #004085;
		background-color: #cce5ff;
		border-color: #b8daff;
		}
  
    .flash_message
		{
			margin-bottom: auto;
		}*/

    .serviceCard {
  width: 100px;
  background: #bb151c !important;
  color: white;
  border: 10px solid #edede9 !important;
  transition: 0.2s ease-in-out;
}

.red-text {
  color: #bb151c !important;
}

.serviceCard:hover {
  box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
}

.ab-direct-btn {
  background: #bb151c !important;
  color: white !important;
}

.ab-direct-btn:hover {
  background: #bb151dee !important;
}


    </style>
    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
  </head>
  <body>
    <!---EDIT of Saidur Vai-->
    <div class="container">
      <div class="row">
        <div class="mt-3">

        <div class="text-center">
          <a href="/">
            <img
              class="img-fluid"
              src="/static/image/ab_logo.png"
              alt="AB BANK PLC"
            />
          </a>
        </div>
      </div>
      </div>

      <div class="row" class="flash_message" style="justify-content: center">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %}
        <div class="alert alert-warning" role="alert">
          {% for category, message in messages %}
          <p class="{{ category }}"><strong>{{ message }}</strong> </p>
          {% endfor %}
        </div>
        {% endif %} {% endwith %}
        <br />
      </div>
      <!-- content -->
      {% block content %}{% endblock content %}

      <!-- end content-->
    </div>

    <!---Footer-->
    
    </div>

    <div
      class="footer"
      style="
        position: relative;
        
        font-weight: 700;
        font-size: 13px;
        text-align: left;
        padding: 0;
        margin-top: 2.7%;
        color: #909090;
        text-transform: capitalize;
        width: 100%;
        min-height: 27px;
        background: rgba(15, 13, 13, 0.82);
      "
    >
      <div class="container">
        <div class="row">
          <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
            <p
              class="copyright"
              style="
                line-height: 27px;
                font-size: 11px;
                text-align: center;
                color: #909090;
                margin: 0;
              "
            >
              Copyright &copy; 2025 AB Bank. All Rights Reserved.
            </p>
          </div>
        </div>
      </div>
    </div>
    
    <script src="/static/bootstrap-4.0/dist/js/bootstrap.bundle.js"></script>
    <script src="/static/bootstrap-4.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/bootstrap-4.0/dist/js/bootstrap.js"></script>
    <script src="/static/bootstrap-4.0/dist/js/bootstrap.min.js"></script>
    <script src="/static/OwlCarousel2-2.3.4/dist/owl.carousel.js"></script>
    <script src="/static/OwlCarousel2-2.3.4/dist/owl.carousel.min.js"></script>
    <script src="/static/slide.js"></script>

    

    {% block js  %}
    {% endblock %}
    
  </body>
</html>
